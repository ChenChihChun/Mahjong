// ============================================================
// BOT LOGIC — runs in host's browser, controls bot players
// ============================================================
const BOT_NAMES   = ['電腦甲', '電腦乙', '電腦丙'];
const BOT_AVATARS = [1, 2, 3];
let botPlayerIds  = [];   // which player IDs are bots
let botListening  = false;

async function addBots() {
  const current = Object.keys(roomPlayers);
  const empty   = PLAYER_IDS.filter(id => !current.includes(id));
  if (empty.length === 0) { showToast('座位已滿'); return; }

  for (let i = 0; i < empty.length; i++) {
    const pid  = empty[i];
    const name = BOT_NAMES[i] || `電腦${i + 1}`;
    await set(ref(db, `rooms/${roomCode}/players/${pid}`), {
      name, avatarIdx: BOT_AVATARS[i] || 1, ready: true, seat: PLAYER_IDS.indexOf(pid), isBot: true,
    });
    botPlayerIds.push(pid);
  }
  showToast(`已加入 ${empty.length} 個電腦玩家`);
}

el('btn-add-bot').addEventListener('click', addBots);

// Start bot brain after game begins
function startBotBrain() {
  if (botListening || botPlayerIds.length === 0) return;
  botListening = true;

  const gRef = ref(db, `rooms/${roomCode}/game`);
  addListener(gRef, snap => {
    if (!snap.exists()) return;
    const gs = snap.val();
    if (!gs || gs.status === 'won') return;

    botPlayerIds.forEach(pid => runBotTurn(gs, pid));
  });
}

const botBusy = {};
const botLastState = {}; // Track last processed state to avoid reprocessing
async function runBotTurn(gs, botPid) {
  if (botBusy[botPid]) return;
  // Create a state key to avoid reprocessing the same state
  const stateKey = `${gs.currentTurn}:${gs.lastDiscard?.tile || ''}:${gs.wallIndex}:${gs.pendingKong?.tile || ''}`;
  if (botLastState[botPid] === stateKey) return;
  botLastState[botPid] = stateKey;
  botBusy[botPid] = true;
  try {
    await _runBotTurnInner(gs, botPid);
  } finally {
    botBusy[botPid] = false;
  }
}
async function _runBotTurnInner(gs, botPid) {
  const { currentTurn, lastDiscard, wall, wallIndex } = gs;
  const hands = gs.hands || {};
  const melds = gs.melds || {};
  const flowers = gs.flowers || {};
  const botHand  = hands[botPid]  || [];
  const botMelds = melds[botPid]  || [];
  const lastTile = lastDiscard?.tile;
  const lastBy   = lastDiscard?.by;

  const isNextPlayer = currentTurn === botPid;

  // --- 搶槓胡: check if bot can rob a pending kong ---
  if (gs.pendingKong && gs.pendingKong.by !== botPid) {
    const kongTile = gs.pendingKong.tile;
    if (canWin([...botHand, kongTile], botMelds)) {
      await new Promise(r => setTimeout(r, 200 + Math.random() * 200));
      const fresh = (await get(ref(db, `rooms/${roomCode}/game`))).val();
      if (fresh?.pendingKong?.tile === kongTile && fresh?.status !== 'won') {
        const fullHand = [...botHand, kongTile];
        const myFlows = flowers[botPid] || [];
        const wallLeft = (fresh.wall || []).length - (fresh.wallIndex || 0);
        const isDealer = fresh.dealer === botPid;
        const seatIdx  = PLAYER_IDS.indexOf(botPid);
        const dIdx = PLAYER_IDS.indexOf(fresh.dealer);
        const { tai, breakdown } = calcTai(fullHand, botMelds, myFlows, false, isDealer, wallLeft, false, seatIdx, dIdx, fresh.round);
        await update(ref(db, `rooms/${roomCode}/game`), {
          status: 'won', winner: botPid, pendingKong: null,
          winInfo: { tai, breakdown: breakdown.join('，'), isSelfDraw: false, hand: fullHand, melds: botMelds, flowers: myFlows, discarder: gs.pendingKong.by },
        });
      }
    }
    return;
  }

  // --- Someone discarded, bot can claim ---
  if (lastTile && lastBy !== botPid) {
    // Priority delay: closer to discarder = shorter wait (一炮多響 resolution)
    const discarderIdx = PLAYER_IDS.indexOf(lastBy);
    const botIdx = PLAYER_IDS.indexOf(botPid);
    const dist = (botIdx - discarderIdx + 4) % 4; // 1=next, 2=across, 3=prev
    await new Promise(r => setTimeout(r, 200 + dist * 150 + Math.random() * 150));
    const fresh = (await get(ref(db, `rooms/${roomCode}/game`))).val();
    if (!fresh || fresh.lastDiscard?.tile !== lastTile) return;

    // 1. Win check (一炮多響: skip if someone already won)
    if (fresh.status === 'won') return;
    if (canWin([...botHand, lastTile], botMelds)) {
      await botDeclareWin(botPid, false, fresh);
      return;
    }
    // 2. Pong (smart: preserve 門清 when beneficial)
    if (canPong(botHand, lastTile)) {
      const hasOpenMelds = botMelds.some(m => m.type !== '暗槓');
      const isHonor = lastTile[1] === 'z';
      // Always pong: honor tiles (tai value), or already have open melds (門清 lost anyway)
      if (isHonor || hasOpenMelds) {
        await botPong(botPid, lastTile, botHand, botMelds);
        return;
      }
      // For number tiles with no open melds: skip pong 50% of the time to preserve 門清
      if (Math.random() > 0.5) {
        await botPong(botPid, lastTile, botHand, botMelds);
        return;
      }
    }
    // 3. Chow (only if this bot is the next player)
    if (isNextPlayer) {
      const chowOpts = canChow(botHand, lastTile, lastBy, botPid);
      if (chowOpts.length > 0) {
        await botChow(botPid, lastTile, chowOpts[0], botMelds, fresh);
        return;
      }
    }
    // 4. If this bot is the "next player" (currentTurn), it must clear lastDiscard so game proceeds
    if (isNextPlayer) {
      await update(ref(db, `rooms/${roomCode}/game`), { lastDiscard: null, pendingAction: null });
      // IMPORTANT: Don't return — fall through to own-turn logic below.
      // Firebase listener fires synchronously during update(), but botBusy is still true,
      // so the re-triggered runBotTurn would be skipped. We must handle own turn here.
      await new Promise(r => setTimeout(r, 300));
      const freshAfterClear = (await get(ref(db, `rooms/${roomCode}/game`))).val();
      if (!freshAfterClear || freshAfterClear.currentTurn !== botPid || freshAfterClear.lastDiscard || freshAfterClear.status === 'won') return;
      // Continue to own-turn logic with fresh state
      const freshHand2 = (freshAfterClear.hands || {})[botPid] || [];
      const freshMelds2 = (freshAfterClear.melds || {})[botPid] || [];
      const expectedLen2 = 17 - 3 * freshMelds2.length;
      if (freshHand2.length < expectedLen2) { await botDraw(botPid, freshAfterClear); return; }
      if (canWin(freshHand2, freshMelds2)) { await botDeclareWin(botPid, true, freshAfterClear); return; }
      const kongOpts2 = getKongOptions(freshHand2, null, freshMelds2).filter(k => k.type !== '明槓');
      if (kongOpts2.length > 0) { await botKong(botPid, kongOpts2[0], freshAfterClear); return; }
      await botDiscard(botPid, freshHand2, freshMelds2, freshAfterClear);
      return;
    }
    // Other bots (not currentTurn) just pass silently — the next player will clear lastDiscard
    return;
  }

  // --- Bot's own turn (no pending discard from others) ---
  if (!isNextPlayer || lastTile) return;
  await new Promise(r => setTimeout(r, 300 + Math.random() * 300));

  const fresh = (await get(ref(db, `rooms/${roomCode}/game`))).val();
  if (!fresh || fresh.currentTurn !== botPid || fresh.lastDiscard) return;

  const freshHand = (fresh.hands || {})[botPid] || [];
  const freshMelds = (fresh.melds || {})[botPid] || [];
  const expectedLen = 17 - 3 * freshMelds.length;

  // Need to draw?
  if (freshHand.length < expectedLen) {
    await botDraw(botPid, fresh);
    return;
  }

  // Self-draw win check
  if (canWin(freshHand, freshMelds)) {
    await botDeclareWin(botPid, true, fresh);
    return;
  }

  // Check for 暗槓/加槓 before discarding
  const kongOpts = getKongOptions(freshHand, null, freshMelds).filter(k => k.type !== '明槓');
  if (kongOpts.length > 0) {
    await botKong(botPid, kongOpts[0], fresh);
    return;
  }

  // Discard worst tile
  await botDiscard(botPid, freshHand, freshMelds, fresh);
}

async function botDraw(botPid, gs) {
  const wall  = gs.wall || [];
  let idx     = gs.wallIndex || 0;
  if (!wall.length || idx >= wall.length) {
    await update(ref(db, `rooms/${roomCode}/game`), {
      status: 'won', winner: null,
      winInfo: { tai: 0, breakdown: '流局（牌牆摸完）', isSelfDraw: false, hand: [], discarder: null },
    });
    return;
  }
  const hand    = [...((gs.hands || {})[botPid] || [])];
  const flowers = [...((gs.flowers || {})[botPid] || [])];
  let tile = wall[idx++];
  while (isFlower(tile) && idx < wall.length) { flowers.push(tile); tile = wall[idx++]; }
  if (isFlower(tile)) {
    flowers.push(tile);
    await update(ref(db, `rooms/${roomCode}/game`), {
      [`flowers/${botPid}`]: flowers, wallIndex: idx,
      status: 'won', winner: null,
      winInfo: { tai: 0, breakdown: '流局（牌牆摸完）', isSelfDraw: false, hand: [], discarder: null },
    });
    return;
  }
  hand.push(tile);
  const hadFlowerDraw = flowers.length > ((gs.flowers || {})[botPid] || []).length;
  await update(ref(db, `rooms/${roomCode}/game`), {
    [`hands/${botPid}`]: hand,
    [`flowers/${botPid}`]: flowers,
    wallIndex: idx,
    flowerDrawPid: hadFlowerDraw ? botPid : null,
  });
}

async function botDiscard(botPid, hand, myMelds, gs) {
  // Simple strategy: discard the tile that is most isolated (fewest neighbours)
  const sorted = sortTiles(hand);
  const score  = t => {
    if (t[0] === 'f') return 0; // flowers shouldn't be in hand
    const suit = t[1];
    if (suit === 'z') {
      // Honor tiles: value based on duplicates (pairs/triplets are valuable)
      const cnt = sorted.filter(x => x === t).length;
      if (cnt >= 3) return 5; // triplet = very valuable (guarantees tai for dragons)
      if (cnt >= 2) return 3; // pair = valuable
      return 0; // isolated honor = safe discard
    }
    const n = parseInt(t[0]), s = suit;
    let val = 0;
    [`${n-1}${s}`,`${n+1}${s}`,`${n-2}${s}`,`${n+2}${s}`].forEach(nb => {
      if (sorted.includes(nb)) val++;
    });
    if (sorted.filter(x => x === t).length >= 2) val += 2; // pairs are good
    return val;
  };
  // Prefer discards that maintain tenpai
  let tenpaiDiscards = [];
  sorted.forEach((t, i) => {
    const remaining = sorted.filter((_, j) => j !== i);
    if (getTenpaiTiles(remaining, myMelds).length > 0) tenpaiDiscards.push(t);
  });

  let worst;
  if (tenpaiDiscards.length > 0) {
    // Among tenpai-safe discards, pick the lowest-scored one
    worst = tenpaiDiscards[0]; let worstScore = score(tenpaiDiscards[0]);
    tenpaiDiscards.forEach(t => { const s = score(t); if (s < worstScore) { worstScore = s; worst = t; } });
  } else {
    // No tenpai possible, discard lowest-scored tile
    worst = sorted[0]; let worstScore = score(sorted[0]);
    sorted.forEach(t => { const s = score(t); if (s < worstScore) { worstScore = s; worst = t; } });
  }

  const newHand = [...sorted];
  const idx = newHand.indexOf(worst);
  newHand.splice(idx, 1);

  await update(ref(db, `rooms/${roomCode}/game`), {
    [`hands/${botPid}`]: newHand,
    [`discards/${botPid}`]: [...((gs.discards || {})[botPid] || []), worst],
    lastDiscard: { tile: worst, by: botPid },
    currentTurn: nextPlayer(botPid),
    pendingAction: null,
    kongDrawPid: null,
    flowerDrawPid: null,
  });
}

async function botPong(botPid, tile, hand, myMelds) {
  const newHand = [...hand];
  let removed = 0;
  const filtered = newHand.filter(t => (t === tile && removed < 2) ? (removed++, false) : true);
  const newMelds  = [...myMelds, { type: '碰', tiles: [tile, tile, tile] }];
  const gs = (await get(ref(db, `rooms/${roomCode}/game`))).val();
  const discarderPile = [...((gs.discards || {})[gs.lastDiscard?.by] || [])];
  discarderPile.pop();
  await update(ref(db, `rooms/${roomCode}/game`), {
    [`hands/${botPid}`]: filtered,
    [`melds/${botPid}`]: newMelds,
    [`discards/${gs.lastDiscard?.by}`]: discarderPile,
    currentTurn: botPid,
    lastDiscard: null,
    pendingAction: null,
  });
  showNotif(`${(roomPlayers[botPid]||{}).name||botPid} 碰！`);
  // Then discard
  await new Promise(r => setTimeout(r, 400));
  const fresh2 = (await get(ref(db, `rooms/${roomCode}/game`))).val();
  if (fresh2?.currentTurn === botPid) {
    await botDiscard(botPid, (fresh2.hands || {})[botPid] || [], (fresh2.melds || {})[botPid] || [], fresh2);
  }
}

async function botKong(botPid, kongOpt, gs) {
  const tile = kongOpt.tile;
  let hand = [...((gs.hands || {})[botPid] || [])];
  let melds = [...((gs.melds || {})[botPid] || [])];
  const removeCount = kongOpt.type === '暗槓' ? 4 : 1;
  let removed = 0;
  hand = hand.filter(t => (t === tile && removed < removeCount) ? (removed++, false) : true);
  if (kongOpt.type === '暗槓') {
    melds.push({ type: '暗槓', tiles: [tile, tile, tile, tile] });
  } else {
    const mIdx = melds.findIndex(m => m.type === '碰' && m.tiles[0] === tile);
    if (mIdx !== -1) melds[mIdx] = { type: '加槓', tiles: [tile, tile, tile, tile] };
  }
  // Draw replacement
  let wallIdx = gs.wallIndex;
  const wall = gs.wall;
  const flowers = [...((gs.flowers || {})[botPid] || [])];
  let drawn = wall[wallIdx++];
  while (drawn && isFlower(drawn) && wallIdx < wall.length) { flowers.push(drawn); drawn = wall[wallIdx++]; }
  if (drawn && !isFlower(drawn)) hand.push(drawn);
  await update(ref(db, `rooms/${roomCode}/game`), {
    [`hands/${botPid}`]: hand, [`melds/${botPid}`]: melds,
    [`flowers/${botPid}`]: flowers, wallIndex: wallIdx,
    currentTurn: botPid, lastDiscard: null, pendingAction: null, pendingKong: null,
    kongDrawPid: botPid,
  });
}

async function botChow(botPid, tile, otherTwo, myMelds, gs) {
  const hand = [...((gs.hands || {})[botPid] || [])];
  let removals = [...otherTwo];
  const filtered = hand.filter(t => {
    const i = removals.indexOf(t);
    if (i !== -1) { removals.splice(i, 1); return false; }
    return true;
  });
  const meldTiles = sortTiles([tile, ...otherTwo]);
  const newMelds = [...myMelds, { type: '吃', tiles: meldTiles }];
  const lastBy = gs.lastDiscard?.by;
  const discarderPile = [...((gs.discards || {})[lastBy] || [])];
  discarderPile.pop();
  await update(ref(db, `rooms/${roomCode}/game`), {
    [`hands/${botPid}`]: filtered, [`melds/${botPid}`]: newMelds,
    [`discards/${lastBy}`]: discarderPile,
    currentTurn: botPid, lastDiscard: null, pendingAction: null,
  });
  showNotif(`${(roomPlayers[botPid]||{}).name||botPid} 吃！`);
  await new Promise(r => setTimeout(r, 400));
  const fresh2 = (await get(ref(db, `rooms/${roomCode}/game`))).val();
  if (fresh2?.currentTurn === botPid) {
    await botDiscard(botPid, (fresh2.hands || {})[botPid] || [], (fresh2.melds || {})[botPid] || [], fresh2);
  }
}

async function botDeclareWin(botPid, isSelfDraw, gs) {
  const hand    = (gs.hands || {})[botPid] || [];
  const myMelds = (gs.melds || {})[botPid] || [];
  const myFlows = (gs.flowers || {})[botPid] || [];
  const lastTile = gs.lastDiscard?.tile;
  const fullHand = isSelfDraw ? hand : [...hand, lastTile];
  if (!canWin(fullHand, myMelds)) return;

  const wallLeft = (gs.wall || []).length - (gs.wallIndex || 0);
  const isDealer = gs.dealer === botPid;
  const seatIdx  = PLAYER_IDS.indexOf(botPid);
  const dIdx = PLAYER_IDS.indexOf(gs.dealer);
  const isKongDraw = isSelfDraw && gs.kongDrawPid === botPid;
  const isFlowerDraw = isSelfDraw && gs.flowerDrawPid === botPid;
  const { tai, breakdown } = calcTai(fullHand, myMelds, myFlows, isSelfDraw, isDealer, wallLeft, false, seatIdx, dIdx, gs.round, isKongDraw, isFlowerDraw);
  await update(ref(db, `rooms/${roomCode}/game`), {
    status: 'won',
    winner: botPid,
    winInfo: {
      tai, breakdown: breakdown.join('，'), isSelfDraw,
      hand: fullHand, melds: myMelds, flowers: myFlows,
      discarder: isSelfDraw ? null : gs.lastDiscard?.by,
    },
  });
}

// ============================================================
// VERSION & MANUAL UPDATE
// ============================================================
const CURRENT_BUILD = '__VERSION__';   // CI 替換為實際版本號

async function checkUpdate(manual = false) {
  const btn = el('btn-check-update');
  btn.textContent = '檢查中…';
  btn.disabled = true;
  try {
    const resp = await fetch('https://api.github.com/repos/ChenChihChun/Mahjong/releases/latest',
      { headers: { 'Accept': 'application/vnd.github+json' } });
    if (!resp.ok) throw new Error('API 失敗');
    const data = await resp.json();
    const latestTag = data.tag_name;              // e.g. "build-12"
    const latestNum = latestTag.replace('build-','');
    const apkAsset  = (data.assets || []).find(a => a.name.endsWith('.apk'));
    const apkUrl    = apkAsset?.browser_download_url || data.html_url;

    const isCurrent = CURRENT_BUILD !== '__VERSION__' && latestNum === CURRENT_BUILD;
    if (isCurrent) {
      showToast('已是最新版本 ✓');
    } else {
      const msg = CURRENT_BUILD === '__VERSION__'
        ? `最新版本：${latestTag}`
        : `目前 v${CURRENT_BUILD}，最新 ${latestTag}`;
      if (confirm(`${msg}\n\n點確定前往下載最新 APK`)) {
        window.open(apkUrl, '_blank');
      }
    }
  } catch (e) {
    if (manual) showToast('無法連線，請稍後再試');
  } finally {
    btn.textContent = '檢查更新';
    btn.disabled = false;
  }
}

el('btn-check-update').addEventListener('click', () => checkUpdate(true));

const roomParam = urlParams.get('room');
